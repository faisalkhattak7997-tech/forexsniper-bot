name: ForexSniper AI Trainer

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install yfinance pandas numpy scikit-learn tensorflow==2.13.0 tf2onnx onnx
      - name: Train
        run: cd Python && python train_model.py
      - name: Deploy
        run: |
          mkdir -p docs/model
          cp Python/model/ForexSniper_AI.onnx docs/model/
          cp Python/model/metadata.json docs/model/
          cp Python/model/scaler_params.json docs/model/
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add docs/model/
          git diff --cached --quiet || git commit -m "Model updated"
          git push
